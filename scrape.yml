name: Scrape Saudi Arabia Companies

on:
  # Run automatically every day at 06:00 UTC
  schedule:
    - cron: "0 6 * * *"

  # Allow manual trigger from the Actions tab
  workflow_dispatch:
    inputs:
      max_pages:
        description: "Max pages to scrape (leave blank for all)"
        required: false
        default: "999"

jobs:
  scrape:
    name: Run scraper
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── 1. Checkout repo ────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up Python ────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # ── 3. Install dependencies ─────────────────────────────────────────────
      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── 4. Override MAX_PAGES if provided via workflow_dispatch ─────────────
      - name: Patch MAX_PAGES (manual run only)
        if: github.event_name == 'workflow_dispatch' && inputs.max_pages != '999'
        run: |
          sed -i "s/^MAX_PAGES\s*=.*/MAX_PAGES   = ${{ inputs.max_pages }}/" scrape_earabicmarket.py

      # ── 5. Run the scraper ───────────────────────────────────────────────────
      - name: Run scraper
        run: python scrape_earabicmarket.py

      # ── 6. Upload CSV + JSON as workflow artifacts (kept for 90 days) ────────
      - name: Upload results as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: saudi-arabia-companies-${{ github.run_number }}
          path: |
            saudi_arabia_companies.csv
            saudi_arabia_companies.json
          retention-days: 90

      # ── 7. (Optional) Commit results back to the repo ────────────────────────
      #  Uncomment this step if you want the CSV/JSON committed automatically.
      #
      # - name: Commit updated data
      #   uses: stefanzweifel/git-auto-commit-action@v5
      #   with:
      #     commit_message: "chore: update Saudi Arabia companies data [skip ci]"
      #     file_pattern: "*.csv *.json"
