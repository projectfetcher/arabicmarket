name: Scrape Saudi Arabia Companies
on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      max_pages:
        description: "Max pages to scrape (leave blank for all)"
        required: false
        default: "999"
jobs:
  scrape:
    name: Run scraper
    runs-on: ubuntu-latest
  
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browsers
        run: |
          playwright install chromium --with-deps || {
            sudo apt-get update
            sudo apt-get install -y libasound2t64 || sudo apt-get install -y libasound2
            playwright install chromium
            playwright install-deps chromium
          }

      - name: Patch MAX_PAGES (manual run only)
        if: github.event_name == 'workflow_dispatch' && inputs.max_pages != '999'
        run: |
          sed -i "s/^MAX_PAGES\s*=.*/MAX_PAGES   = ${{ inputs.max_pages }}/" scrape_earabicmarket.py

      - name: Run scraper
        run: python scrape_earabicmarket.py

      - name: Verify output
        run: |
          echo "=== CSV preview (first 5 lines) ==="
          head -5 saudi_arabia_companies.csv
          echo "=== Row count ==="
          wc -l saudi_arabia_companies.csv

      - name: Upload debug artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-${{ github.run_number }}
          path: |
            debug_page1.png
            debug_page1.html
          if-no-files-found: ignore
          retention-days: 7
